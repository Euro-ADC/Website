<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projet Euro ADC</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <div id="side-menu" class="side-menu">
        <span class="close-btn" onclick="toggleMenu()">&times;</span>
        <div class="menu-content">
            <p class="menu-title">Menu</p>
            <nav>
                <a href="/">Accueil</a>
                <a href="/articles">Articles</a>
                <a href="/images">Images</a>
                <a href="/admin">Administration</a>
            </nav>
        </div>
    </div>

    <div id="overlay" class="overlay" onclick="toggleMenu()"></div>

    <div id="main-wrapper">
        <div class="div-icon-menu" id="div-icon-menu"></div>
        <img src="{{ url_for('static', filename='images/menu.svg') }}"
             alt="MENU"
             class="image-icon-menu"
             onclick="toggleMenu()">

        <header id="main-header">
            <div class="div-main-title">
                <p class="text-main-title">Voices from behind the graves</p>
            </div>
        </header>

        <div class="div-subtitle">
            <p class="text-subtitle">Un projet de la section européenne du lycée Arcisse de Caumont</p>
        </div>
    </div>

    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Mot de passe">
    <button onclick="login()">Se connecter</button>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabase_client = supabase.createClient('{{ url_provided }}', '{{ key_provided }}');

        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const { data, error } = await supabase_client.auth.signInWithPassword({ email, password });

            if (error) {
                alert('Erreur: ' + error.message);
            } else {
                document.cookie = 'supabase_token=' + data.session.access_token + '; path=/; max-age=3600';
                window.location.href = '/admin';
            }
        }
    </script>
</body>
</html>
